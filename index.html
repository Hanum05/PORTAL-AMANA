<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Utama | Pilih Tujuan</title>
    
    <!-- Menggunakan Tailwind CSS untuk styling instan dan rapi -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Menggunakan Lucide Icons untuk ikon yang modern -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Menggunakan Google Font 'Poppins' agar tipografi terlihat elegan -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
        
        /* Animasi background gradien yang halus */
        .bg-animated {
            background: linear-gradient(-45deg, #23021a, #78125c, #a22458, #23021a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Efek glow saat kartu disorot */
        .card-hover:hover {
            box-shadow: 0 0 30px rgba(162, 36, 88, 0.4); /* Warna glow disesuaikan dengan #a22458 */
            transform: translateY(-8px);
        }
    </style>
</head>
<!-- Diubah: Menggunakan h-[100dvh], w-screen, dan overflow-hidden agar halaman terkunci kaku tidak bisa digeser -->
<body class="bg-animated h-[100dvh] w-screen flex flex-col p-4 sm:p-6 text-white overflow-hidden relative">

    <!-- HEADER / JUDUL (Dipisah menjadi Header Utama di atas layar) -->
    <header class="w-full max-w-6xl mx-auto z-30 relative pt-2 sm:pt-4 opacity-0 translate-y-4 animate-[fadeIn_1s_ease-out_forwards] text-center lg:text-left">
    <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-bold mb-2 lg:mb-4 bg-clip-text text-transparent bg-gradient-to-r from-[#FFC32D] to-[#FF962D]">
        PORTAL AMANA
    </h1>
    <p class="text-[#FFFFFF] text-sm sm:text-base md:text-xl lg:pr-12">
        Pilih menu di bawah untuk mengakses Website atau membaca Penjelasan Poster.
    </p>
    </header>

    <!-- 1. MASKOT GAMBAR (Absolute Bottom) -->
    <!-- Dikeluarkan dari alur normal agar alasnya menempel persis di dasar layar -->
    <div class="absolute bottom-0 left-0 w-full z-10 pointer-events-none flex justify-center lg:justify-end opacity-0 animate-[fadeIn_1s_ease-out_0.6s_forwards]">
        <div class="w-full max-w-6xl flex justify-center lg:justify-end lg:pr-[5%]">
            <!-- object-bottom memastikan alas selalu menyentuh batas bawah layar -->
            <img src="maskot.png" alt="Maskot AMANA" class="h-[82vh] w-auto max-w-none sm:h-auto sm:w-[60%] lg:w-full lg:max-w-[480px] lg:max-h-[85vh] object-contain object-bottom drop-shadow-[0_0_30px_rgba(162,36,88,0.5)] border-none outline-none" style="border: none; outline: none; background: transparent;" />
        </div>
    </div>

    <!-- 2. CONTAINER MENU (Z-20, Berada di depan Maskot) -->
    <!-- flex-1 membuatnya mengisi sisa ruang, justify-end (mobile) menaruh menu di bawah, justify-center (desktop) menaruh menu di tengah -->
    <!-- Diubah: pb-8 menjadi pb-16 sm:pb-20 agar di mode HP tombol agak naik ke atas -->
    <main class="w-full max-w-6xl mx-auto z-20 relative flex-1 flex flex-col justify-end lg:justify-center pb-16 sm:pb-20 lg:pb-0 mt-8 lg:mt-0">
        
        <!-- Bagian Kiri: Menu -->
        <div class="w-full lg:w-[60%] xl:w-[55%]">
            
            <!-- PILIHAN MENU -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-6 w-[90%] max-w-[320px] sm:max-w-none sm:w-full mx-auto lg:mx-0">
                
                <!-- TOMBOL / KARTU 1: Penjelasan Poster (Sekarang di urutan pertama) -->
                <a href="https://hanum05.github.io/Penjelasan-Poster-Amana/" target="_blank" rel="noopener noreferrer" class="card-hover group relative bg-slate-800/50 backdrop-blur-sm border border-slate-700 p-4 sm:p-8 rounded-2xl sm:rounded-3xl transition-all duration-500 ease-out overflow-hidden hover:border-pink-500/50 block opacity-0 translate-y-8 animate-[fadeIn_1s_ease-out_0.2s_forwards]">
                    <div class="absolute inset-0 bg-gradient-to-br from-pink-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    
                    <!-- Diubah: flex-row (menyamping) di HP, flex-col (ke bawah) di layar besar -->
                    <div class="relative z-10 flex flex-row sm:flex-col items-center sm:items-center text-left sm:text-center gap-4 sm:gap-0">
                        
                        <!-- Ikon (Di kiri pada HP) -->
                        <div class="shrink-0 w-12 h-12 sm:w-20 sm:h-20 rounded-xl sm:rounded-2xl bg-pink-500/20 flex items-center justify-center mb-0 sm:mb-6 text-pink-400 group-hover:scale-110 group-hover:bg-pink-500 group-hover:text-white transition-all duration-500">
                            <i data-lucide="file-text" class="w-6 h-6 sm:w-10 sm:h-10"></i>
                        </div>
                        
                        <!-- Teks Keterangan (Di kanan ikon pada HP) -->
                        <div class="flex flex-col flex-1">
                            <h2 class="text-base sm:text-2xl font-semibold mb-1 sm:mb-3 text-white group-hover:text-pink-400 transition-colors">
                                Penjelasan Poster
                            </h2>
                            <p class="text-slate-400 text-[11px] sm:text-sm leading-tight sm:leading-relaxed mb-2 sm:mb-6">
                                Baca penjelasan dari konten yang ada di dalam poster AMANA.
                            </p>
                            <div class="mt-auto inline-flex items-center text-pink-400 text-xs sm:text-base font-medium group-hover:gap-3 gap-2 transition-all">
                                Baca Selengkapnya <i data-lucide="arrow-right" class="w-3 h-3 sm:w-4 sm:h-4"></i>
                            </div>
                        </div>

                    </div>
                </a>

                <!-- TOMBOL / KARTU 2: Website AMANA (Sekarang di urutan kedua) -->
                <a href="https://hanum05.github.io/AMANA/" target="_blank" rel="noopener noreferrer" class="card-hover group relative bg-slate-800/50 backdrop-blur-sm border border-slate-700 p-4 sm:p-8 rounded-2xl sm:rounded-3xl transition-all duration-500 ease-out overflow-hidden hover:border-rose-500/50 block opacity-0 translate-y-8 animate-[fadeIn_1s_ease-out_0.4s_forwards]">
                    <div class="absolute inset-0 bg-gradient-to-br from-rose-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    
                    <!-- Diubah: flex-row (menyamping) di HP, flex-col (ke bawah) di layar besar -->
                    <div class="relative z-10 flex flex-row sm:flex-col items-center sm:items-center text-left sm:text-center gap-4 sm:gap-0">
                        
                        <!-- Ikon (Di kiri pada HP) -->
                        <div class="shrink-0 w-12 h-12 sm:w-20 sm:h-20 rounded-xl sm:rounded-2xl bg-rose-500/20 flex items-center justify-center mb-0 sm:mb-6 text-rose-400 group-hover:scale-110 group-hover:bg-rose-500 group-hover:text-white transition-all duration-500">
                            <i data-lucide="monitor-smartphone" class="w-6 h-6 sm:w-10 sm:h-10"></i>
                        </div>
                        
                        <!-- Teks Keterangan (Di kanan ikon pada HP) -->
                        <div class="flex flex-col flex-1">
                            <h2 class="text-base sm:text-2xl font-semibold mb-1 sm:mb-3 text-white group-hover:text-rose-400 transition-colors">
                                Website AMANA
                            </h2>
                            <p class="text-slate-400 text-[11px] sm:text-sm leading-tight sm:leading-relaxed mb-2 sm:mb-6">
                                Akses langsung ke web AMANA yang sedang dibahas di dalam poster.
                            </p>
                            <div class="mt-auto inline-flex items-center text-rose-400 text-xs sm:text-base font-medium group-hover:gap-3 gap-2 transition-all">
                                Buka Website <i data-lucide="arrow-right" class="w-3 h-3 sm:w-4 sm:h-4"></i>
                            </div>
                        </div>

                    </div>
                </a>

            </div>
        </div>
    </div>

    <!-- Keyframes untuk efek fade-in/muncul -->
    <style>
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

    <!-- Inisialisasi Ikon -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
